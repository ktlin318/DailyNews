<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>NEWSROOM AI｜每日 AI 焦點快報</title>
  <style>
    :root{--paper:#ece9e1;--paper-deep:#e2dfd4;--card:#fdfcfa;--ink:#17223b;--soft:#4b5878;--mute:#8b90a0;--line:#d9d4c6;--line-strong:#c7c1af;--brass:#a9762c;--brass-deep:#7e5a20;--macro:#3b4b7a;--macro-bg:#e7eaf3;--market:#a9762c;--market-bg:#f4e9d5;--life:#2f6e5d;--life-bg:#e1efe9;--shadow:0 1px 2px rgba(23,34,59,.06)}*{box-sizing:border-box}body{margin:0;background:var(--paper);color:var(--ink);font-family:"Microsoft JhengHei","PingFang TC",sans-serif;line-height:1.6}.masthead{background:var(--ink);color:#edeae0;padding:14px 32px;display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap}.brand{display:flex;align-items:baseline;gap:12px}.brand-mark{font-size:22px;font-weight:700;letter-spacing:.5px}.brand-mark span{color:var(--brass)}.brand-sub,.edition,label{font-size:11px;letter-spacing:1.3px;color:#a9afc2}.edition{border-left:1px solid #3a4560;padding-left:16px}.head-right{display:flex;align-items:center;gap:20px;flex-wrap:wrap}.date-picker{display:flex;gap:8px;align-items:center}.date-picker select{background:#1f2c48;color:#edeae0;border:1px solid #3a4560;border-radius:6px;padding:7px 10px;font:13px inherit;cursor:pointer}.filterbar{background:var(--paper-deep);border-bottom:1px solid var(--line-strong);padding:12px 32px;display:flex;gap:28px;flex-wrap:wrap;align-items:center}.filter-group,.pill-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}.filter-label{font-size:11px;letter-spacing:1px;color:var(--mute)}.pill{border:1px solid var(--line-strong);background:var(--card);color:var(--soft);font:500 13px inherit;padding:6px 14px;border-radius:20px;cursor:pointer}.pill:hover{border-color:var(--brass);color:var(--brass-deep)}.pill.active{background:var(--ink);border-color:var(--ink);color:#edeae0}.layout{max-width:1280px;margin:auto;padding:32px;display:grid;grid-template-columns:minmax(0,1fr) 360px;gap:28px;align-items:start}.date-line{font-size:12px;letter-spacing:1px;color:var(--mute);margin-bottom:6px}.main-header{margin-bottom:22px}.main-header h1{font-size:28px;margin:0;letter-spacing:.5px}.overview-card,.news-card{background:var(--card);border:1px solid var(--line);border-radius:10px;box-shadow:var(--shadow)}.overview-card{border-left:4px solid var(--brass);padding:18px 22px;margin-bottom:26px}.ov-label,.sidebar-eyebrow,.s-label{font-size:11px;letter-spacing:1.5px;color:var(--brass-deep);margin-bottom:8px}.overview-card p{margin:0;font-size:14.5px;color:var(--soft)}.news-list{display:flex;flex-direction:column;gap:16px}.news-card{padding:20px 22px}.news-meta,.keywords,.sources{display:flex;align-items:center;gap:8px;flex-wrap:wrap}.news-meta{margin-bottom:10px}.topic-tag{font-size:11px;font-weight:600;padding:3px 10px;border-radius:5px;letter-spacing:.5px}.topic-tag.macro{background:var(--macro-bg);color:var(--macro)}.topic-tag.market{background:var(--market-bg);color:var(--brass-deep)}.topic-tag.life{background:var(--life-bg);color:var(--life)}.news-time{font-size:12px;color:var(--mute)}.news-card h3{font-size:18px;margin:0 0 8px;line-height:1.5}.summary{font-size:14px;color:var(--soft);margin:0 0 12px}.keywords{margin-bottom:12px}.keyword{font-size:12px;color:var(--mute);background:var(--paper);border:1px solid var(--line);padding:2px 9px;border-radius:4px}.sources{border-top:1px solid var(--line);padding-top:10px;gap:14px}.source-link{font-size:12.5px;color:var(--brass-deep);text-decoration:none;font-weight:500}.source-link:hover{text-decoration:underline}.empty{background:var(--card);border:1px dashed var(--line-strong);border-radius:10px;padding:40px;text-align:center;color:var(--mute);font-size:14px}.sidebar{position:sticky;top:20px}.sidebar-card{background:var(--ink);color:#edeae0;border-radius:12px;padding:22px;box-shadow:var(--shadow)}.sidebar-eyebrow{color:var(--brass)}.sidebar-combo{font-size:19px;font-weight:600;margin:0 0 18px;padding-bottom:14px;border-bottom:1px solid #333f5c}.sidebar-combo span{color:#7a82a0;font-weight:400;margin:0 6px}.sidebar-section{margin-bottom:18px}.s-label{color:#a9afc2;letter-spacing:1px}.opening-text{font-size:14px;line-height:1.75;background:#1f2c48;border-radius:8px;padding:14px 16px;border-left:3px solid var(--brass)}.followup-list{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:8px}.followup-list li{font-size:13.5px;color:#d6d9e4;background:#1f2c48;padding:10px 12px;border-radius:8px;display:flex;gap:8px}.q{color:var(--brass);font-weight:700}.copy-btn{width:100%;margin-top:6px;background:var(--brass);color:#221803;border:0;border-radius:8px;padding:11px;font:600 14px inherit;cursor:pointer}.copy-btn.copied{background:var(--life);color:#fff}.sidebar-hint{font-size:12px;color:#7a82a0;margin-top:14px;line-height:1.6}@media(max-width:820px){.layout{grid-template-columns:1fr;padding:20px;gap:24px}.sidebar{position:static}.masthead,.filterbar{padding-left:20px;padding-right:20px}}@media(max-width:600px){.masthead{padding:14px 16px;flex-direction:column;align-items:flex-start}.head-right{width:100%;justify-content:space-between}.edition{display:none}.filterbar{padding:12px 16px;gap:16px}.filter-group{width:100%}.layout{padding:16px}.main-header h1{font-size:22px}.news-card,.overview-card{padding:16px 18px}}
    .topic-tag.ai{background:#eee6f6;color:#6f3f8c}.overview-card{background:transparent;border:0;border-bottom:2px solid var(--brass);border-radius:0;box-shadow:none;padding:2px 0 24px;margin-bottom:28px}.overview-card .ov-label{font-size:13px;font-weight:700;letter-spacing:1.4px;color:var(--brass-deep);margin-bottom:10px}.overview-card p{font-size:17px;line-height:1.75;color:var(--ink);font-weight:500}
    .audience-tabs{display:flex;gap:4px;overflow-x:auto;border-bottom:1px solid #333f5c;margin:0 0 16px;padding:0 0 1px;scrollbar-width:thin}.audience-tab{flex:0 0 auto;border:0;border-bottom:2px solid transparent;background:transparent;color:#8991aa;font:600 12px inherit;padding:8px 10px;cursor:pointer;white-space:nowrap}.audience-tab:hover{color:#d6d9e4}.audience-tab.active{color:#f0c983;border-bottom-color:var(--brass)}.audience-tab:focus-visible{outline:2px solid var(--brass);outline-offset:2px}@media(max-width:600px){.audience-tab{padding-left:8px;padding-right:8px}}
  </style>
</head>
<body>
  <header class="masthead">
    <div class="brand"><div class="brand-mark">NEWSROOM <span>AI</span></div><div class="brand-sub">快速掌握每日焦點，輕鬆開啟客戶對話</div></div>
    <div class="head-right"><div class="edition" id="edition"></div><label class="date-picker">新聞日期 <select id="datePicker"></select></label></div>
  </header>
  <div class="filterbar">
    <div class="filter-group"><span class="filter-label">主題</span><div class="pill-row" id="topicPills"></div></div>
  </div>
  <div class="layout">
    <main>
      <div class="main-header"><div class="date-line" id="dateLine"></div><h1>每日 AI 焦點快報</h1></div>
      <div class="overview-card"><div class="ov-label">今日市場一句話</div><p id="overviewText"></p></div>
      <div class="news-list" id="newsList"></div>
    </main>
    <aside class="sidebar"><div class="sidebar-card">
      <div class="sidebar-eyebrow">客群溝通建議</div>
      <div class="audience-tabs" id="audienceTabs" role="tablist" aria-label="選擇客群"></div>
      <div id="audiencePanel" role="tabpanel"><div class="sidebar-combo" id="comboLabel"></div>
      <div class="sidebar-section"><div class="s-label">建議開場</div><div class="opening-text" id="openingText"></div></div>
      <div class="sidebar-section"><div class="s-label">延伸追問</div><ul class="followup-list" id="followupList"></ul></div>
      <button class="copy-btn" id="copyBtn">複製溝通建議</button><div class="sidebar-hint">內容依當日新聞自動生成，建議依實際對談情境微調用語。</div>
      </div>
    </div></aside>
  </div>
  <script>
    const state={date:"",topic:"全部",audience:"全部客群"};
    const topicLabels={全部:"全部",國際:"國際",台股:"台股",ETF:"ETF",AI:"AI"};
    const picker=document.querySelector("#datePicker"),topicPills=document.querySelector("#topicPills"),audienceTabs=document.querySelector("#audienceTabs");
    let digest=null;
    function escapeHtml(value){return String(value).replace(/[&<>"]/g,char=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[char]))}
    function safeUrl(value){try{const url=new URL(value,location.href);return url.protocol==="https:"?url.href:"#"}catch{return "#"}}
    function tagClass(topic){return topic==="台股"?"macro":topic==="ETF"?"market":topic==="AI"?"ai":"life"}
    function formatDate(value){const d=new Date(value+"T00:00:00");return d.toLocaleDateString("zh-TW",{year:"numeric",month:"long",day:"numeric",weekday:"short"})}
    function renderPills(){const topics=digest?.topics||[],audiences=digest?.audiences||[];topicPills.innerHTML=topics.map(x=>`<button class="pill ${state.topic===x?"active":""}" data-topic="${escapeHtml(x)}">${escapeHtml(topicLabels[x]||x)}</button>`).join("");audienceTabs.innerHTML=audiences.map(x=>`<button class="audience-tab ${state.audience===x?"active":""}" role="tab" aria-selected="${state.audience===x}" aria-controls="audiencePanel" tabindex="${state.audience===x?"0":"-1"}" data-audience="${escapeHtml(x)}">${escapeHtml(x)}</button>`).join("");document.querySelectorAll("[data-topic]").forEach(b=>b.onclick=()=>{state.topic=b.dataset.topic;render()});document.querySelectorAll("[data-audience]").forEach(b=>b.onclick=()=>{state.audience=b.dataset.audience;render()})}
    function renderNews(){const list=(digest?.events||[]).filter(n=>(state.topic==="全部"||n.topic===state.topic)&&(state.audience==="全部客群"||n.audiences.includes(state.audience)));document.querySelector("#newsList").innerHTML=list.length?list.map(n=>`<article class="news-card"><div class="news-meta"><span class="topic-tag ${tagClass(n.topic)}">${escapeHtml(topicLabels[n.topic]||n.topic)}</span><span class="news-time">${escapeHtml(n.time)}</span></div><h3>${escapeHtml(n.title)}</h3><p class="summary">${escapeHtml(n.summary)}</p><div class="keywords">${n.keywords.map(k=>`<span class="keyword">#${escapeHtml(k)}</span>`).join("")}</div><div class="sources">${n.sources.map(s=>`<a class="source-link" href="${escapeHtml(safeUrl(s.url))}" target="_blank" rel="noopener noreferrer">${escapeHtml(s.publisher)} ↗</a>`).join("")}</div></article>`).join(""):'<div class="empty">此主題與客群在所選日期暫無新聞內容。</div>'}
    function renderTrack(){const tracks=digest?.audience_talk_tracks||{},key=state.topic+"|"+state.audience,track=tracks[key]||tracks[state.topic+"|全部客群"]||tracks["全部|"+state.audience]||tracks["全部|全部客群"];document.querySelector("#comboLabel").innerHTML=`${escapeHtml(state.topic==="全部"?"全部主題":state.topic)}<span>×</span>${escapeHtml(state.audience)}`;document.querySelector("#openingText").textContent=track?"「"+track.opening+"」":"暫無對應建議";document.querySelector("#followupList").innerHTML=track?track.questions.map(q=>`<li><span class="q">Q</span><span>${escapeHtml(q)}</span></li>`).join(""):""}
    function render(){if(!digest)return;document.querySelector("#edition").innerHTML="DAILY BRIEF · <b>"+formatDate(state.date)+"</b>";document.querySelector("#dateLine").textContent=formatDate(state.date)+"｜每日 AI 焦點快報";document.querySelector("#overviewText").textContent=digest.topic_overviews[state.topic]||digest.daily_overview;renderPills();renderNews();renderTrack()}
    async function loadDate(date){document.querySelector("#newsList").innerHTML='<div class="empty">正在載入新聞資料…</div>';try{const response=await fetch(`data/${date}.json`,{cache:"no-store"});if(!response.ok)throw new Error(`HTTP ${response.status}`);digest=await response.json();state.date=date;if(!digest.topics.includes(state.topic))state.topic="全部";if(!digest.audiences.includes(state.audience))state.audience="全部客群";render()}catch(error){digest=null;document.querySelector("#overviewText").textContent="資料暫時無法載入。";document.querySelector("#newsList").innerHTML=`<div class="empty">無法載入 ${escapeHtml(date)} 的新聞資料。請透過 GitHub Pages 或本機網頁伺服器開啟。<br>${escapeHtml(error.message)}</div>`}}
    async function loadIndex(){try{const response=await fetch("data/index.json",{cache:"no-store"});if(!response.ok)throw new Error(`HTTP ${response.status}`);const index=await response.json();picker.innerHTML=index.dates.map(date=>`<option value="${escapeHtml(date)}">${formatDate(date)}</option>`).join("");picker.value=index.latest;picker.onchange=()=>loadDate(picker.value);await loadDate(index.latest)}catch(error){document.querySelector("#newsList").innerHTML=`<div class="empty">無法讀取新聞日期清單。請確認使用網頁伺服器開啟。<br>${escapeHtml(error.message)}</div>`}}
    document.querySelector("#copyBtn").onclick=async()=>{const t=document.querySelector("#openingText").textContent+"\n"+[...document.querySelectorAll("#followupList li")].map(x=>x.innerText).join("\n");try{await navigator.clipboard.writeText(t)}catch{}const b=document.querySelector("#copyBtn");b.textContent="已複製";b.classList.add("copied");setTimeout(()=>{b.textContent="複製溝通建議";b.classList.remove("copied")},1500)};
    loadIndex();
  </script>
</body>
</html>
