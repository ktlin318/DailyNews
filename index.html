<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>NEWSROOM AI｜每日 AI 焦點快報</title>
  <style>
    :root{--paper:#ece9e1;--paper-deep:#e2dfd4;--card:#fdfcfa;--ink:#17223b;--soft:#4b5878;--mute:#8b90a0;--line:#d9d4c6;--line-strong:#c7c1af;--brass:#a9762c;--brass-deep:#7e5a20;--macro:#3b4b7a;--macro-bg:#e7eaf3;--market:#a9762c;--market-bg:#f4e9d5;--life:#2f6e5d;--life-bg:#e1efe9;--loan:#9b573c;--loan-bg:#f5e5de;--card-accent:#315d86;--card-accent-bg:#e2edf6;--ai:#6f3f8c;--ai-bg:#eee6f6;--shadow:0 1px 2px rgba(23,34,59,.06)}
    *{box-sizing:border-box}
    body{margin:0;background:var(--paper);color:var(--ink);font-family:"Microsoft JhengHei","PingFang TC",sans-serif;line-height:1.6}
    button,input,select{font-family:inherit}.visually-hidden{position:absolute!important;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
    .masthead{background:var(--ink);color:#edeae0;padding:14px 32px;display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap}
    .brand{display:flex;align-items:baseline;gap:12px}.brand-mark{font-size:22px;font-weight:700;letter-spacing:.5px;white-space:nowrap}.brand-mark span{color:var(--brass)}
    .brand-sub,.edition,label{font-size:14px;letter-spacing:1.3px;color:#a9afc2}.edition{border-left:1px solid #3a4560;padding-left:16px}
    .head-right{display:flex;align-items:center;gap:20px;flex-wrap:wrap}.date-picker{display:flex;gap:8px;align-items:center;position:relative}.date-trigger{background:#1f2c48;color:#edeae0;border:1px solid #3a4560;border-radius:6px;padding:7px 10px;font-size:14px;cursor:pointer;min-width:132px;text-align:left}.date-trigger:hover,.date-trigger[aria-expanded="true"]{border-color:var(--brass)}.calendar-popover{position:absolute;right:0;top:calc(100% + 9px);z-index:20;width:294px;background:var(--card);color:var(--ink);border:1px solid var(--line-strong);border-radius:10px;padding:12px;box-shadow:0 12px 30px rgba(15,24,45,.22)}.calendar-popover[hidden]{display:none}.calendar-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}.calendar-title{font-size:14px;font-weight:700}.calendar-nav{border:0;background:transparent;color:var(--soft);font-size:20px;cursor:pointer;padding:2px 8px;border-radius:5px}.calendar-nav:hover:not(:disabled){background:var(--paper)}.calendar-nav:disabled{color:#c7c5bf;cursor:not-allowed}.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}.calendar-weekday{text-align:center;color:var(--mute);font-size:14px;padding:4px 0}.calendar-day{aspect-ratio:1;border:1px solid transparent;border-radius:6px;background:transparent;color:var(--ink);font-size:14px;cursor:pointer}.calendar-day:hover:not(:disabled){border-color:var(--brass);color:var(--brass-deep)}.calendar-day.selected{background:var(--ink);color:#fff}.calendar-day:disabled{color:#c5c3bc;background:#f0eee9;cursor:not-allowed}.calendar-day.blank{visibility:hidden}
    .filterbar{background:var(--paper-deep);border-bottom:1px solid var(--line-strong);padding:12px 32px;display:flex;gap:22px;flex-wrap:wrap;align-items:center}
    .filter-group,.pill-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}.filter-label{font-size:14px;letter-spacing:1px;color:var(--mute)}
    .pill{border:1px solid var(--line-strong);background:var(--card);color:var(--soft);font-size:14px;font-weight:500;padding:6px 14px;border-radius:20px;cursor:pointer}.pill:hover{border-color:var(--brass);color:var(--brass-deep)}.pill.active{background:var(--ink);border-color:var(--ink);color:#edeae0}
    .search-wrap{margin-left:auto;position:relative;min-width:250px}.search-input{width:100%;border:1px solid var(--line-strong);border-radius:20px;background:var(--card);color:var(--ink);font-size:14px;padding:7px 36px 7px 40px;outline:none}.search-input:focus{border-color:var(--brass);box-shadow:0 0 0 2px rgba(169,118,44,.12)}.search-icon{position:absolute;left:10px;top:50%;width:20px;height:20px;transform:translateY(-50%);display:grid;place-items:center;color:var(--mute);pointer-events:none}.search-icon svg{display:block;width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}.search-clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);border:0;background:transparent;color:var(--mute);font-size:18px;line-height:1;cursor:pointer;padding:4px 6px}.search-clear[hidden]{display:none}
    .layout{max-width:1280px;margin:auto;padding:32px;display:grid;grid-template-columns:minmax(0,1fr) 360px;grid-template-areas:"header sidebar" "overview sidebar" "news sidebar";column-gap:28px;row-gap:22px;align-items:start}
    .main-header{grid-area:header}.date-line{font-size:14px;letter-spacing:1px;color:var(--mute);margin-bottom:6px}.main-header h1{font-size:28px;margin:0;letter-spacing:.5px}
    .overview-card{grid-area:overview;background:transparent;border:0;border-bottom:2px solid var(--brass);padding:2px 0 24px}.ov-label,.sidebar-eyebrow,.s-label{font-size:14px;letter-spacing:1.5px;color:var(--brass-deep);margin-bottom:8px}.overview-card .ov-label{font-size:14px;font-weight:700;letter-spacing:1.4px}.overview-card p{margin:0;font-size:17px;line-height:1.75;color:var(--ink);font-weight:500}
    .news-section{grid-area:news;min-width:0}.results-toolbar{min-height:30px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}.result-count{font-size:14px;color:var(--mute)}.active-keyword{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--brass);background:#f7eedf;color:var(--brass-deep);border-radius:16px;padding:4px 10px;font-size:14px}.active-keyword button{border:0;background:transparent;color:inherit;cursor:pointer;font-size:15px;line-height:1;padding:0}
    .news-list{display:flex;flex-direction:column;gap:16px}.news-card{background:var(--card);border:1px solid var(--line);border-radius:10px;box-shadow:var(--shadow);padding:20px 22px}.news-meta,.keywords,.sources{display:flex;align-items:center;gap:8px;flex-wrap:wrap}.news-meta{margin-bottom:10px}.topic-tag{font-size:14px;font-weight:600;padding:3px 10px;border-radius:5px;letter-spacing:.5px}.topic-tag.invest{background:var(--market-bg);color:var(--brass-deep)}.topic-tag.loan{background:var(--loan-bg);color:var(--loan)}.topic-tag.credit-card{background:var(--card-accent-bg);color:var(--card-accent)}.topic-tag.fresh{background:var(--life-bg);color:var(--life)}.topic-tag.ai{background:var(--ai-bg);color:var(--ai)}.news-time{font-size:14px;color:var(--mute)}.news-card h3{font-size:18px;margin:0 0 8px;line-height:1.5}.summary{font-size:14px;color:var(--soft);margin:0 0 12px}.keywords{margin-bottom:12px}.keyword{font-size:14px;color:var(--mute);background:var(--paper);border:1px solid var(--line);padding:2px 9px;border-radius:4px;cursor:pointer}.keyword:hover,.keyword.active{border-color:var(--brass);color:var(--brass-deep);background:#f7eedf}.sources{border-top:1px solid var(--line);padding-top:10px;gap:14px}.source-link{font-size:14px;color:var(--brass-deep);text-decoration:none;font-weight:500}.source-link:hover{text-decoration:underline}.empty{background:var(--card);border:1px dashed var(--line-strong);border-radius:10px;padding:40px;text-align:center;color:var(--mute);font-size:14px}.pagination{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:18px;flex-wrap:wrap}.page-btn{min-width:36px;height:36px;border:1px solid var(--line-strong);border-radius:7px;background:var(--card);color:var(--soft);cursor:pointer}.page-btn:hover:not(:disabled){border-color:var(--brass);color:var(--brass-deep)}.page-btn.active{background:var(--ink);border-color:var(--ink);color:#fff}.page-btn:disabled{opacity:.45;cursor:not-allowed}
    .sidebar{grid-area:sidebar;position:sticky;top:20px}.sidebar-card{background:var(--ink);color:#edeae0;border-radius:12px;padding:22px;box-shadow:var(--shadow)}.sidebar-eyebrow{color:var(--brass)}.sidebar-combo{font-size:19px;font-weight:600;margin:0 0 18px;padding-bottom:14px;border-bottom:1px solid #333f5c}.sidebar-combo span{color:#7a82a0;font-weight:400;margin:0 6px}.sidebar-section{margin-bottom:18px}.s-label{color:#a9afc2;letter-spacing:1px}.opening-text{font-size:14px;line-height:1.75;background:#1f2c48;border-radius:8px;padding:14px 16px;border-left:3px solid var(--brass)}.followup-list{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:8px}.followup-list li{font-size:14px;color:#d6d9e4;background:#1f2c48;padding:10px 12px;border-radius:8px;display:flex;gap:8px}.q{color:var(--brass);font-weight:700}.copy-btn{width:100%;margin-top:6px;background:var(--brass);color:#221803;border:0;border-radius:8px;padding:11px;font-size:14px;font-weight:600;cursor:pointer}.copy-btn.copied{background:var(--life);color:#fff}.sidebar-hint{font-size:14px;color:#7a82a0;margin-top:14px;line-height:1.6}.audience-tabs{display:flex;gap:4px;overflow-x:auto;border-bottom:1px solid #333f5c;margin:0 0 16px;padding:0 0 1px;scrollbar-width:thin}.audience-tab{flex:0 0 auto;border:0;border-bottom:2px solid transparent;background:transparent;color:#8991aa;font-size:14px;font-weight:600;padding:8px 10px;cursor:pointer;white-space:nowrap}.audience-tab:hover{color:#d6d9e4}.audience-tab.active{color:#f0c983;border-bottom-color:var(--brass)}.audience-tab:focus-visible{outline:2px solid var(--brass);outline-offset:2px}
    .page-footer{max-width:1280px;margin:0 auto;padding:0 32px 24px;text-align:right;color:var(--mute);font-size:14px;letter-spacing:.8px}
    @media(max-width:820px){.layout{grid-template-columns:1fr;grid-template-areas:"header" "overview" "sidebar" "news";padding:20px;gap:24px}.sidebar{position:static}.masthead,.filterbar{padding-left:20px;padding-right:20px}.search-wrap{margin-left:0;min-width:min(100%,320px)}}
    @media(max-width:600px){.masthead{padding:14px 16px;flex-direction:column;align-items:flex-start}.brand{width:100%;flex-direction:column;gap:1px}.head-right{width:100%;justify-content:space-between}.edition{display:none}.calendar-popover{left:0;right:auto;width:min(294px,calc(100vw - 32px))}.filterbar{padding:12px 16px;gap:12px}.filter-group,.search-wrap{width:100%}.pill-row{flex-wrap:nowrap;overflow-x:auto;padding-bottom:2px;scrollbar-width:thin}.pill{flex:0 0 auto}.layout{padding:16px;row-gap:20px}.main-header h1{font-size:22px}.news-card{padding:16px 18px}.overview-card{padding-bottom:20px}.overview-card p{font-size:16px}.audience-tab{padding-left:8px;padding-right:8px}.page-footer{padding:0 16px 20px}}
  </style>
</head>
<body>
  <header class="masthead">
    <div class="brand"><div class="brand-mark">NEWSROOM <span>AI</span></div><div class="brand-sub">快速掌握每日焦點，輕鬆開啟客戶對話</div></div>
    <div class="head-right"><div class="edition" id="edition"></div><div class="date-picker"><span>選擇日期</span><button class="date-trigger" id="dateTrigger" type="button" aria-haspopup="dialog" aria-expanded="false"></button><div class="calendar-popover" id="calendarPopover" role="dialog" aria-label="選擇有新聞資料的日期" hidden><div class="calendar-head"><button class="calendar-nav" id="calendarPrev" type="button" aria-label="上個月">‹</button><div class="calendar-title" id="calendarTitle"></div><button class="calendar-nav" id="calendarNext" type="button" aria-label="下個月">›</button></div><div class="calendar-grid" id="calendarGrid"></div></div></div></div>
  </header>
  <div class="filterbar">
    <div class="filter-group"><span class="filter-label">主題</span><div class="pill-row" id="topicPills"></div></div>
    <div class="search-wrap"><span class="search-icon" aria-hidden="true"><svg viewBox="0 0 24 24" focusable="false"><circle cx="11" cy="11" r="6.5"></circle><path d="m16 16 4.25 4.25"></path></svg></span><label for="searchInput" class="visually-hidden">搜尋新聞</label><input class="search-input" id="searchInput" type="search" placeholder="搜尋新聞、摘要或關鍵字" autocomplete="off"><button class="search-clear" id="searchClear" type="button" aria-label="清除搜尋" hidden>×</button></div>
  </div>
  <div class="layout">
    <div class="main-header"><div class="date-line" id="dateLine"></div><h1>每日 AI 焦點快報</h1></div>
    <div class="overview-card"><div class="ov-label">今日市場一句話</div><p id="overviewText"></p></div>
    <aside class="sidebar"><div class="sidebar-card">
      <div class="sidebar-eyebrow">客群溝通建議</div>
      <div class="audience-tabs" id="audienceTabs" role="tablist" aria-label="選擇客群"></div>
      <div id="audiencePanel" role="tabpanel"><div class="sidebar-combo" id="comboLabel"></div>
      <div class="sidebar-section"><div class="s-label">開場一句</div><div class="opening-text" id="openingText"></div></div>
      <div class="sidebar-section"><div class="s-label">延伸提問</div><ul class="followup-list" id="followupList"></ul></div>
      <button class="copy-btn" id="copyBtn">複製溝通建議</button><div class="sidebar-hint">內容依當日新聞自動生成，建議依實際對談情境微調用語。</div>
      </div>
    </div></aside>
    <section class="news-section" aria-label="新聞列表"><div class="results-toolbar"><div class="result-count" id="resultCount"></div><div id="activeFilters"></div></div><div class="news-list" id="newsList"></div><nav class="pagination" id="pagination" aria-label="新聞分頁"></nav></section>
  </div>
  <footer class="page-footer">Version 1.1 Preview</footer>
  <script>
    const state={date:"",topic:"",audience:"",query:"",keyword:"",page:1,pageSize:10};
    const dateTrigger=document.querySelector("#dateTrigger"),calendarPopover=document.querySelector("#calendarPopover"),calendarGrid=document.querySelector("#calendarGrid"),topicPills=document.querySelector("#topicPills"),audienceTabs=document.querySelector("#audienceTabs"),searchInput=document.querySelector("#searchInput"),searchClear=document.querySelector("#searchClear");
    let digest=null,availableDates=[],calendarMonth=null;
    function escapeHtml(value){return String(value).replace(/[&<>\"]/g,char=>({"&":"&amp;","<":"&lt;",">":"&gt;",'\"':"&quot;"}[char]))}
    function safeUrl(value){try{const url=new URL(value,location.href);return url.protocol==="https:"?url.href:"#"}catch{return "#"}}
    function tagClass(topic){return topic==="投資理財"?"invest":topic==="貸款"?"loan":topic==="信用卡"?"credit-card":topic==="AI"?"ai":"fresh"}
    function formatDate(value){const d=new Date(value+"T00:00:00");return d.toLocaleDateString("zh-TW",{year:"numeric",month:"long",day:"numeric",weekday:"short"})}
    function formatMonthDay(value){const earliest=value||"";const match=earliest.match(/\d{4}-(\d{2})-(\d{2})/);return match?`${match[1]}/${match[2]}`:""}
    function earliestPublished(news){return news.published_date||[...(news.sources||[])].map(source=>source.published_at).filter(Boolean).sort()[0]||state.date}
    function normalize(value){return String(value||"").toLocaleLowerCase("zh-Hant-TW").replace(/\s+/g," ").trim()}
    function renderControls(){const topics=digest?.topics||[],audiences=digest?.audiences||[];topicPills.innerHTML=topics.map(x=>`<button class="pill ${state.topic===x?"active":""}" type="button" aria-pressed="${state.topic===x}" data-topic="${escapeHtml(x)}">${escapeHtml(x)}</button>`).join("");audienceTabs.innerHTML=audiences.map(x=>`<button class="audience-tab ${state.audience===x?"active":""}" type="button" role="tab" aria-selected="${state.audience===x}" aria-controls="audiencePanel" tabindex="${state.audience===x?"0":"-1"}" data-audience="${escapeHtml(x)}">${escapeHtml(x)}</button>`).join("");document.querySelectorAll("[data-topic]").forEach(b=>b.onclick=()=>{state.topic=b.dataset.topic;state.page=1;render()});document.querySelectorAll("[data-audience]").forEach(b=>b.onclick=()=>{state.audience=b.dataset.audience;render()})}
    function matchesSearch(news){if(!state.query)return true;const sourceNames=(news.sources||[]).map(s=>s.publisher).join(" ");const haystack=normalize([news.title,news.summary,...(news.keywords||[]),sourceNames].join(" "));return normalize(state.query).split(" ").every(term=>haystack.includes(term))}
    function filteredNews(){const allTopic=digest?.topics?.[0];return(digest?.events||[]).filter(news=>(state.topic===allTopic||news.topic===state.topic)&&(!state.keyword||(news.keywords||[]).includes(state.keyword))&&matchesSearch(news)).sort((a,b)=>(b.focus_score||0)-(a.focus_score||0)||String(earliestPublished(b)).localeCompare(String(earliestPublished(a)))||a.event_id.localeCompare(b.event_id))}
    function renderPagination(totalPages){const pager=document.querySelector("#pagination");if(totalPages<=1){pager.innerHTML="";return}const buttons=[];buttons.push(`<button class="page-btn" type="button" data-page="${state.page-1}" ${state.page===1?"disabled":""} aria-label="上一頁">‹</button>`);for(let page=1;page<=totalPages;page++)buttons.push(`<button class="page-btn ${page===state.page?"active":""}" type="button" data-page="${page}" aria-current="${page===state.page?"page":"false"}">${page}</button>`);buttons.push(`<button class="page-btn" type="button" data-page="${state.page+1}" ${state.page===totalPages?"disabled":""} aria-label="下一頁">›</button>`);pager.innerHTML=buttons.join("");pager.querySelectorAll("[data-page]:not(:disabled)").forEach(button=>button.onclick=()=>{state.page=Number(button.dataset.page);renderNews();document.querySelector(".news-section").scrollIntoView({behavior:"smooth",block:"start"})})}
    function renderNews(){const list=filteredNews(),totalPages=Math.max(1,Math.ceil(list.length/state.pageSize));if(state.page>totalPages)state.page=totalPages;const visible=list.slice((state.page-1)*state.pageSize,state.page*state.pageSize);document.querySelector("#resultCount").textContent=list.length?`共 ${list.length} 則 · 第 ${state.page}/${totalPages} 頁`:"共 0 則";document.querySelector("#activeFilters").innerHTML=state.keyword?`<span class="active-keyword">#${escapeHtml(state.keyword)}<button type="button" data-clear-keyword aria-label="清除標籤篩選">×</button></span>`:"";document.querySelector("#newsList").innerHTML=visible.length?visible.map(news=>`<article class="news-card"><div class="news-meta"><span class="topic-tag ${tagClass(news.topic)}">${escapeHtml(news.topic)}</span><span class="news-time">${escapeHtml(formatMonthDay(earliestPublished(news)))}</span></div><h3>${escapeHtml(news.title)}</h3><p class="summary">${escapeHtml(news.summary)}</p><div class="keywords">${news.keywords.map(keyword=>`<button class="keyword ${state.keyword===keyword?"active":""}" type="button" aria-pressed="${state.keyword===keyword}" data-keyword="${escapeHtml(keyword)}">#${escapeHtml(keyword)}</button>`).join("")}</div><div class="sources">${news.sources.map(source=>`<a class="source-link" href="${escapeHtml(safeUrl(source.url))}" target="_blank" rel="noopener noreferrer">${escapeHtml(source.publisher)} ↗</a>`).join("")}</div></article>`).join(""):'<div class="empty">沒有符合目前條件的新聞，請調整主題、關鍵字或搜尋內容。</div>';renderPagination(list.length?totalPages:0);document.querySelectorAll("[data-keyword]").forEach(button=>button.onclick=()=>{state.keyword=state.keyword===button.dataset.keyword?"":button.dataset.keyword;state.page=1;renderNews()});document.querySelector("[data-clear-keyword]")?.addEventListener("click",()=>{state.keyword="";state.page=1;renderNews()})}
    function renderTrack(){const tracks=digest?.audience_talk_tracks||{},allTopic=digest?.topics?.[0]||"",key=state.topic+"|"+state.audience,track=tracks[key]||tracks[allTopic+"|"+state.audience]||Object.entries(tracks).find(([trackKey])=>trackKey.startsWith(state.topic+"|"))?.[1];document.querySelector("#comboLabel").innerHTML=`${escapeHtml(state.topic===allTopic?allTopic+"主題":state.topic)}<span>×</span>${escapeHtml(state.audience)}`;document.querySelector("#openingText").textContent=track?"「"+track.opening+"」":"暫無對應建議";document.querySelector("#followupList").innerHTML=track?track.questions.map(question=>`<li><span class="q">Q</span><span>${escapeHtml(question)}</span></li>`).join(""):""}
    function render(){if(!digest)return;document.querySelector("#edition").innerHTML="DAILY BRIEF · <b>"+formatDate(state.date)+"</b>";document.querySelector("#dateLine").textContent=formatDate(state.date)+"｜每日 AI 焦點快報";document.querySelector("#overviewText").textContent=digest.topic_overviews[state.topic]||digest.daily_overview;renderControls();renderNews();renderTrack()}
    function renderCalendar(){if(!calendarMonth)return;const year=calendarMonth.getFullYear(),month=calendarMonth.getMonth(),firstDay=new Date(year,month,1).getDay(),days=new Date(year,month+1,0).getDate(),available=new Set(availableDates);document.querySelector("#calendarTitle").textContent=`${year} 年 ${month+1} 月`;const cells=["日","一","二","三","四","五","六"].map(day=>`<div class="calendar-weekday">${day}</div>`);for(let i=0;i<firstDay;i++)cells.push('<button class="calendar-day blank" type="button" disabled></button>');for(let day=1;day<=days;day++){const date=`${year}-${String(month+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`,enabled=available.has(date);cells.push(`<button class="calendar-day ${date===state.date?"selected":""}" type="button" data-date="${date}" ${enabled?"":"disabled"} aria-label="${date}${enabled?"":"，沒有資料"}">${day}</button>`)}calendarGrid.innerHTML=cells.join("");calendarGrid.querySelectorAll("[data-date]:not(:disabled)").forEach(button=>button.onclick=async()=>{closeCalendar();state.page=1;await loadDate(button.dataset.date)});const months=availableDates.map(date=>date.slice(0,7)).sort();document.querySelector("#calendarPrev").disabled=`${year}-${String(month+1).padStart(2,"0")}`<=months[0];document.querySelector("#calendarNext").disabled=`${year}-${String(month+1).padStart(2,"0")}`>=months.at(-1)}
    function closeCalendar(){calendarPopover.hidden=true;dateTrigger.setAttribute("aria-expanded","false")}
    function moveCalendar(delta){calendarMonth=new Date(calendarMonth.getFullYear(),calendarMonth.getMonth()+delta,1);renderCalendar()}
    async function loadDate(date){document.querySelector("#newsList").innerHTML='<div class="empty">正在載入新聞資料…</div>';try{const response=await fetch(`data/${date}.json`,{cache:"no-store"});if(!response.ok)throw new Error(`HTTP ${response.status}`);digest=await response.json();state.date=date;state.page=1;dateTrigger.textContent=formatDate(date);calendarMonth=new Date(date+"T00:00:00");if(!digest.topics.includes(state.topic))state.topic=digest.topics[0];if(!digest.audiences.includes(state.audience))state.audience=digest.audiences[0];state.keyword="";renderCalendar();render()}catch(error){digest=null;document.querySelector("#overviewText").textContent="資料暫時無法載入。";document.querySelector("#newsList").innerHTML=`<div class="empty">無法載入 ${escapeHtml(date)} 的新聞資料。請透過 GitHub Pages 或本機網頁伺服器開啟。<br>${escapeHtml(error.message)}</div>`}}
    async function loadIndex(){try{const response=await fetch("data/index.json",{cache:"no-store"});if(!response.ok)throw new Error(`HTTP ${response.status}`);const index=await response.json();availableDates=[...index.dates].sort();calendarMonth=new Date(index.latest+"T00:00:00");renderCalendar();await loadDate(index.latest)}catch(error){document.querySelector("#newsList").innerHTML=`<div class="empty">無法讀取新聞日期清單。請確認使用網頁伺服器開啟。<br>${escapeHtml(error.message)}</div>`}}
    dateTrigger.onclick=()=>{const opening=calendarPopover.hidden;calendarPopover.hidden=!opening;dateTrigger.setAttribute("aria-expanded",String(opening));if(opening)renderCalendar()};document.querySelector("#calendarPrev").onclick=()=>moveCalendar(-1);document.querySelector("#calendarNext").onclick=()=>moveCalendar(1);document.addEventListener("click",event=>{if(!event.target.closest(".date-picker"))closeCalendar()});document.addEventListener("keydown",event=>{if(event.key==="Escape")closeCalendar()});
    searchInput.addEventListener("input",()=>{state.query=searchInput.value;state.page=1;searchClear.hidden=!state.query;renderNews()});searchClear.addEventListener("click",()=>{searchInput.value="";state.query="";state.page=1;searchClear.hidden=true;searchInput.focus();renderNews()});
    document.querySelector("#copyBtn").onclick=async()=>{const text=document.querySelector("#openingText").textContent+"\n"+[...document.querySelectorAll("#followupList li")].map(item=>item.innerText).join("\n");try{await navigator.clipboard.writeText(text)}catch{}const button=document.querySelector("#copyBtn");button.textContent="已複製";button.classList.add("copied");setTimeout(()=>{button.textContent="複製溝通建議";button.classList.remove("copied")},1500)};
    loadIndex();
  </script>
</body>
</html>
